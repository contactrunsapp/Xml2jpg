<!DOCTYPE html>
<html>
<head>
    <title>📸 Supabase Image Gallery</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 15px; background: #f5f5f5; }
        h1 { color: #333; }
        .upload-area { background: white; border: 2px dashed #3498db; border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; margin: 20px 0; }
        #fileInput { display: none; }
        .preview { max-width: 100%; max-height: 200px; margin: 10px auto; border-radius: 10px; display: none; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery-item { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .gallery-item img { width: 100%; height: 150px; object-fit: cover; }
        .filename { padding: 8px; font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loading { text-align: center; padding: 20px; color: #888; }
        .status { text-align: center; margin: 10px; color: #27ae60; }
        .note { font-size: 12px; color: #888; margin-top: 8px; }
    </style>
    <!-- Supabase JS library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>📸 Supabase Image Gallery</h1>
    <div class="status" id="status"></div>

    <div class="upload-area" id="uploadArea">
        <p>📤 Tap to select an image</p>
        <p class="note">Images will be compressed (max width 800px, quality 0.8).</p>
        <input type="file" id="fileInput" accept="image/*">
        <img class="preview" id="preview" alt="Preview">
    </div>

    <div id="loading" class="loading">⏳ Loading images...</div>
    <div class="gallery" id="gallery"></div>

    <script>
        // ---------- YOUR SUPABASE CREDENTIALS ----------
        const SUPABASE_URL = 'https://edqruxfpjlxogxjxezub.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkcXJ1eGZwamx4b2d4anhlenViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTk2NTAsImV4cCI6MjA4NzQ3NTY1MH0.f9i5Ga61JX3pI1AS4XxtS4Am_VkUkxTk8SnAGvOLXIc';
        // ------------------------------------------------

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showStatus(msg, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = msg;
            statusEl.style.color = isError ? '#e74c3c' : '#27ae60';
            setTimeout(() => { if (statusEl.textContent === msg) statusEl.textContent = ''; }, 3000);
        }

        // ---------- COMPRESS IMAGE ----------
        function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth || height > maxHeight) {
                            const ratio = Math.min(maxWidth / width, maxHeight / height);
                            width *= ratio;
                            height *= ratio;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // ---------- UPLOAD IMAGE ----------
        async function uploadImage(file) {
            try {
                const preview = document.getElementById('preview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                showStatus('⏳ Compressing...');
                const compressedBlob = await compressImage(file);

                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.jpg`;

                showStatus('⏳ Uploading to Supabase...');
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('images')
                    .upload(fileName, compressedBlob, { contentType: 'image/jpeg' });

                if (uploadError) throw uploadError;

                const { data: urlData } = supabase.storage.from('images').getPublicUrl(fileName);
                const publicUrl = urlData.publicUrl;

                const { error: dbError } = await supabase
                    .from('images')
                    .insert([{ filename: file.name, public_url: publicUrl, mime_type: 'image/jpeg' }]);

                if (dbError) throw dbError;

                showStatus('✅ Upload successful!');
                preview.style.display = 'none';
                preview.src = '';
                loadGallery();
            } catch (err) {
                console.error(err);
                showStatus('❌ Error: ' + err.message, true);
            }
        }

        // ---------- LOAD GALLERY ----------
        async function loadGallery() {
            document.getElementById('loading').style.display = 'block';
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            try {
                const { data: images, error } = await supabase
                    .from('images')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!images || images.length === 0) {
                    gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No images yet.</p>';
                } else {
                    let html = '';
                    images.forEach(img => {
                        html += `
                            <div class="gallery-item">
                                <img src="${img.public_url}" alt="${img.filename}" loading="lazy">
                                <div class="filename">${img.filename}</div>
                            </div>
                        `;
                    });
                    gallery.innerHTML = html;
                }
            } catch (err) {
                console.error(err);
                gallery.innerHTML = '<p style="color: red;">Error loading gallery. Check console.</p>';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) uploadImage(file);
        });

        loadGallery();
    </script>
</body>
</html>
