<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📸 My Image Gallery</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }
        h1 { font-size: 28px; font-weight: 600; color: #1e293b; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .upload-area {
            background: white;
            border: 2px dashed #3b82f6;
            border-radius: 24px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .upload-area:active { background: #eef2ff; }
        .upload-area p { font-size: 18px; font-weight: 500; color: #1e293b; }
        .upload-area .note { font-size: 14px; color: #64748b; margin-top: 8px; }
        #fileInput { display: none; }
        .preview {
            max-width: 100%;
            max-height: 200px;
            margin: 16px auto 0;
            border-radius: 16px;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }
        .status {
            text-align: center;
            margin: 12px 0;
            font-weight: 500;
            min-height: 24px;
            color: #0d9488;
        }
        .status.error { color: #b91c1c; }
        .loading {
            text-align: center;
            color: #64748b;
            padding: 20px;
            font-size: 16px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .gallery-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: #f1f5f9;
        }
        .filename {
            padding: 8px 10px;
            font-size: 12px;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: white;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
        }
    </style>
    <!-- Supabase JS library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>📸 My Gallery</h1>

    <div class="status" id="status"></div>

    <div class="upload-area" id="uploadArea">
        <p>📤 Tap to select an image</p>
        <p class="note">Images are compressed (max 800px, 80% quality).</p>
        <input type="file" id="fileInput" accept="image/*">
        <img class="preview" id="preview" alt="Preview">
    </div>

    <div id="loading" class="loading">⏳ Loading images...</div>
    <div class="gallery" id="gallery"></div>
    <div class="footer">Your images are stored in Supabase</div>

    <script>
        (function() {
            // ========== YOUR SUPABASE CREDENTIALS ==========
            const SUPABASE_URL = 'https://edqruxfpjlxogxjxezub.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkcXJ1eGZwamx4b2d4anhlenViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTk2NTAsImV4cCI6MjA4NzQ3NTY1MH0.f9i5Ga61JX3pI1AS4XxtS4Am_VkUkxTk8SnAGvOLXIc';
            // ================================================

            // Initialize Supabase
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // DOM elements
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const preview = document.getElementById('preview');
            const statusDiv = document.getElementById('status');
            const loadingDiv = document.getElementById('loading');
            const galleryDiv = document.getElementById('gallery');

            // Table name (your table is "image", not "images")
            const TABLE_NAME = 'image';

            function showStatus(msg, isError = false) {
                statusDiv.textContent = msg;
                statusDiv.style.color = isError ? '#b91c1c' : '#0d9488';
                setTimeout(() => {
                    if (statusDiv.textContent === msg) statusDiv.textContent = '';
                }, 4000);
            }

            // ---------- COMPRESS IMAGE ----------
            function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.8) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            let width = img.width;
                            let height = img.height;

                            if (width > maxWidth || height > maxHeight) {
                                const ratio = Math.min(maxWidth / width, maxHeight / height);
                                width *= ratio;
                                height *= ratio;
                            }

                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            canvas.toBlob((blob) => {
                                resolve(blob);
                            }, 'image/jpeg', quality);
                        };
                        img.onerror = reject;
                    };
                    reader.onerror = reject;
                });
            }

            // ---------- UPLOAD IMAGE ----------
            async function uploadImage(file) {
                try {
                    preview.src = URL.createObjectURL(file);
                    preview.style.display = 'block';
                    showStatus('⏳ Compressing...');

                    const compressedBlob = await compressImage(file);
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.jpg`;

                    showStatus('⏳ Uploading to Supabase...');

                    // Upload to storage bucket named "images"
                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('images')
                        .upload(fileName, compressedBlob, {
                            contentType: 'image/jpeg',
                            cacheControl: '3600'
                        });

                    if (uploadError) throw uploadError;

                    // Get public URL
                    const { data: urlData } = supabase.storage
                        .from('images')
                        .getPublicUrl(fileName);

                    const publicUrl = urlData.publicUrl;

                    // Save metadata to your table "image"
                    const { error: dbError } = await supabase
                        .from(TABLE_NAME)
                        .insert([{
                            filename: file.name,
                            public_url: publicUrl,
                            mime_type: 'image/jpeg'
                        }]);

                    if (dbError) throw dbError;

                    showStatus('✅ Upload successful!');
                    preview.style.display = 'none';
                    preview.src = '';

                    // Refresh gallery
                    loadGallery();
                } catch (err) {
                    console.error('Upload error:', err);
                    showStatus('❌ ' + (err.message || 'Upload failed'), true);
                    preview.style.display = 'none';
                }
            }

            // ---------- LOAD GALLERY ----------
            async function loadGallery() {
                loadingDiv.style.display = 'block';
                galleryDiv.innerHTML = '';

                try {
                    const { data: images, error } = await supabase
                        .from(TABLE_NAME)
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    if (!images || images.length === 0) {
                        galleryDiv.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#64748b;">No images yet. Tap above to upload.</p>';
                    } else {
                        let html = '';
                        images.forEach(img => {
                            html += `
                                <div class="gallery-item">
                                    <img src="${img.public_url}" alt="${img.filename}" loading="lazy">
                                    <div class="filename">${img.filename}</div>
                                </div>
                            `;
                        });
                        galleryDiv.innerHTML = html;
                    }
                } catch (err) {
                    console.error('Load error:', err);
                    galleryDiv.innerHTML = `<p style="color: red; text-align: center;">Error: ${err.message}</p>`;
                } finally {
                    loadingDiv.style.display = 'none';
                }
            }

            // ---------- EVENT LISTENERS ----------
            uploadArea.addEventListener('click', (e) => {
                e.preventDefault();
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadImage(file);
                }
                fileInput.value = ''; // allow re-select
            });

            // Drag & drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = '#eef2ff';
            });
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = 'white';
            });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = 'white';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    uploadImage(file);
                } else {
                    showStatus('Please drop an image file', true);
                }
            });

            // Initial load
            loadGallery();

            // Auto-refresh every 30 seconds
            setInterval(loadGallery, 30000);
        })();
    </script>
</body>
</html>
